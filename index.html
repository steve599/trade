<script>

// Enhanced but fast OCR
let worker = null;

async function initTesseract() {
  if (worker) return worker;
  worker = await Tesseract.createWorker({
    logger: m => {
      if (m.status === 'recognizing text') {
        const p = Math.round(m.progress * 100);
        document.getElementById('ocr-msg').textContent = `Scanning… ${p}%`;
        document.getElementById('ocr-bar').style.width = p + '%';
      }
    }
  });
  await worker.loadLanguage('chi_sim+eng');
  await worker.initialize('chi_sim+eng');
  await worker.setParameters({
    tessedit_pageseg_mode: Tesseract.PSM.AUTO,           // Better for charts
    tessedit_ocr_engine_mode: Tesseract.OEM.TESSERACT_ONLY, // Fast legacy engine
    preserve_interword_spaces: '1',
    tessedit_char_whitelist: '0123456789.%+-日线K线成交量持仓量RSI买盘卖盘高低价',
  });
  return worker;
}

// Mild, fast preprocessing (mild contrast + small scale - preserves your original speed)
async function preprocessImage(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d', {willReadFrequently: true});

      const scale = 1.4;  // Light upscale - good accuracy boost without much slowdown
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      // Very light contrast boost optimized for dark charts (fast loop)
      for (let i = 0; i < data.length; i += 4) {
        let gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
        gray = (gray - 50) * 1.5;   // Mild adjustment
        gray = Math.max(0, Math.min(255, gray));
        data[i] = data[i+1] = data[i+2] = gray;
      }

      ctx.putImageData(imageData, 0, 0);
      resolve(canvas.toDataURL('image/png', 0.9));
    };
    img.src = dataUrl;
  });
}

document.getElementById('btn-run').addEventListener('click', runOCR);

async function runOCR(){
  if(!imgData) return;

  const box = document.getElementById('ocr-box');
  const msg = document.getElementById('ocr-msg');
  const bar = document.getElementById('ocr-bar');
  const dot = document.getElementById('dot');

  box.style.display = 'block';
  bar.style.width = '0%';
  dot.classList.add('on');
  msg.textContent = 'Preparing image...';   // More accurate message

  try {
    const w = await initTesseract();
    msg.textContent = 'Recognizing text...';

    const enhanced = await preprocessImage(imgData);   // Light & fast
    const result = await w.recognize(enhanced);

    msg.textContent = 'Analysis complete ✓';
    dot.classList.remove('on');

    const rawText = result.data.text.trim();
    analysis = analyzeText(rawText);
    renderCards(analysis, rawText);

  } catch (err) {
    console.error(err);
    msg.textContent = 'Error: ' + err.message;
    dot.classList.remove('on');
  }
}

// === Add Save to Notes function (identical to working.txt style) ===
document.getElementById('btn-notes').addEventListener('click', saveToNotes);

function saveToNotes() {
  if (!reportText) {
    showToast("No report yet. Generate one first.");
    return;
  }

  const now = new Date();
  const dateStr = now.toLocaleDateString('zh-CN', {year:'numeric', month:'2-digit', day:'2-digit'});
  const title = `ScreenScan 分析报告 ${dateStr}`;

  const fullText = `${title}\n${'='.repeat(50)}\n\n${reportText}\n\nGenerated by ScreenScan · ${now.toLocaleString('zh-CN')}`;

  if (navigator.share) {
    navigator.share({ title, text: fullText })
      .then(() => showToast("✅ 已分享（可保存到 Notes）"))
      .catch(() => {});
  } else {
    const blob = new Blob([fullText], {type:'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = title.replace(/[/\\?%*:|"<>]/g, '-') + '.txt';
    a.click();
    URL.revokeObjectURL(url);
    showToast("📥 报告已下载");
  }
}

function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    Object.assign(toast.style, {position:'fixed', bottom:'30px', left:'50%', transform:'translateX(-50%)', background:'#1f1f1f', border:'1px solid #f0a500', color:'#fff', padding:'12px 20px', borderRadius:'8px', fontSize:'13px', zIndex:'9999', whiteSpace:'nowrap', opacity:'0', transition:'opacity .3s'});
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  setTimeout(() => toast.style.opacity = '0', 2500);
}
